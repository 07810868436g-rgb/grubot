<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RobuxTap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .user-info {
            font-size: 20px;
            margin-bottom: 20px;
            color: #888;
        }
        .score-container {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 60px;
        }
        .tap-button {
            width: 220px;
            height: 220px;
            background-color: #00b050;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .tap-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="user-info" id="userName">Загрузка...</div>
    
    <div class="score-container">
        Баланс: <span id="score">0</span> R$
    </div>
    
    <div class="tap-button" id="tapBtn">
        ТАП!
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let score = 0;
        const scoreElement = document.getElementById('score');
        const tapBtn = document.getElementById('tapBtn');
        const userNameElement = document.getElementById('userName');

        // 1. Идентификация: получаем данные пользователя из Телеграма
        const user = tg.initDataUnsafe?.user;
        if (user) {
            userNameElement.innerText = `Игрок: ${user.first_name}`;
        } else {
            userNameElement.innerText = "Игра запущена вне Телеграма";
        }

        // 2. Загрузка: достаем сохраненный баланс из облака при запуске
        tg.CloudStorage.getItem('robux_balance', (err, value) => {
            if (!err && value) {
                score = parseInt(value); // Превращаем текст в число
                scoreElement.innerText = score;
            }
        });

        // 3. Логика клика и сохранения
        tapBtn.addEventListener('click', () => {
            score++;
            scoreElement.innerText = score;
            tg.HapticFeedback.impactOccurred('light');

            // Сохраняем новый баланс в облако (превращаем число в текст, так как облако хранит только текст)
            tg.CloudStorage.setItem('robux_balance', score.toString());
        });
    </script>
</body>
</html>
